{% extends 'base.html' %}
{% block tabs %}{% endblock %}

{% block content %}
<div class="header">
    <h2 style="font-size:22px; font-weight:700;">Explore <span style="font-size:18px;">✨</span></h2>
</div>
<div class="feed-content" style="padding-top:16px;">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        {% for post in posts if not post.is_taken_down %}
        <div style="position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;background:#333;">
            <img src="{{ url_for('static', filename='uploads/' + (post.image_filename or '')) }}"
                style="width:100%;height:100%;object-fit:cover;"
                onerror="this.src='https://ui-avatars.com/api/?name={{ post.author.username }}&background=random&color=fff&size=512';">
            <div
                style="position:absolute;bottom:0;left:0;right:0;padding:12px;background:linear-gradient(transparent, #000);color:white;font-size:11px;font-weight:600;">
                ❤️ 1.2k
            </div>
        </div>
        {% else %}
        <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-secondary);">No posts to explore.
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
